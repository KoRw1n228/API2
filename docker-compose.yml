version: '3.8'

services:
  # Сервіс бази даних
  db:
    image: postgres:15-alpine
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
      POSTGRES_DB: library_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Сервіс нашого веб-додатку (API)
  web:
    build: .
    container_name: library_web_api
    ports:
      - "5000:5000"
    environment:
      # Посилання на базу даних використовує ім'я сервісу "db" замість localhost
      DATABASE_URL: postgresql://library_user:library_password@db:5432/library_database
    depends_on:
      - db

volumes:
  postgres_data: